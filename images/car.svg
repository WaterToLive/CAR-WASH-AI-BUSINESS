<svg width="300" height="150" viewBox="0 0 300 150" xmlns="http://www.w3.org/2000/svg">
  <!-- Car body -->
  <rect x="50" y="80" width="200" height="50" rx="10" fill="#4A90E2" stroke="#333" stroke-width="2"/>
  <!-- Car roof -->
  <rect x="70" y="50" width="160" height="40" rx="20" fill="#4A90E2" stroke="#333" stroke-width="2"/>
  <!-- Wheels -->
  <circle cx="100" cy="130" r="20" fill="#333"/>
  <circle cx="200" cy="130" r="20" fill="#333"/>
  <circle cx="100" cy="130" r="10" fill="#666"/>
  <circle cx="200" cy="130" r="10" fill="#666"/>
  <!-- Windows -->
  <rect x="80" y="60" width="50" height="25" rx="5" fill="#87CEEB" opacity="0.7"/>
  <rect x="140" y="60" width="80" height="25" rx="5" fill="#87CEEB" opacity="0.7"/>
  <!-- Headlights -->
  <circle cx="240" cy="100" r="5" fill="#FFD700"/>
  <!-- Taillights -->
  <circle cx="60" cy="100" r="5" fill="#FF0000"/>
</svg>